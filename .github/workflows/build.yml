name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zlib1g-dev libnifti-dev

      - name: Download ONNX Runtime
        run: |
          mkdir -p third_party
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz
          tar xzf onnxruntime-linux-x64-1.22.0.tgz
          mv onnxruntime-linux-x64-1.22.0 third_party/onnxruntime

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Smoke test
        run: |
          export LD_LIBRARY_PATH=build:third_party/onnxruntime/lib:$LD_LIBRARY_PATH
          ./build/totalseg_cli --help || true
          echo "Build successful, binary runs"

      - name: Package
        run: |
          mkdir -p dist/include dist/lib dist/bin
          cp build/libtotalseg.so dist/lib/
          cp build/totalseg_cli dist/bin/
          cp include/*.h dist/include/
          cp models/*.json dist/
          cd dist && tar czf ../libtotalseg-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: libtotalseg-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path third_party
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-win-x64-1.22.0.zip" -OutFile "ort.zip"
          Expand-Archive -Path "ort.zip" -DestinationPath "."
          Move-Item -Path "onnxruntime-win-x64-1.22.0" -Destination "third_party\onnxruntime"

      - name: Install NIfTI (vcpkg)
        shell: pwsh
        run: |
          vcpkg install nifticlib:x64-windows zlib:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Build
        shell: pwsh
        run: |
          mkdir build; cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"
          cmake --build . --config Release

      - name: Smoke test
        shell: pwsh
        run: |
          $env:PATH = "build\Release;third_party\onnxruntime\lib;$env:PATH"
          .\build\Release\totalseg_cli.exe --help
          Write-Host "Build successful, binary runs"

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\include, dist\lib, dist\bin
          Copy-Item build\Release\totalseg.dll dist\lib\
          Copy-Item build\Release\totalseg.lib dist\lib\
          Copy-Item build\Release\totalseg_cli.exe dist\bin\
          Copy-Item include\*.h dist\include\
          Copy-Item models\*.json dist\
          Compress-Archive -Path dist\* -DestinationPath libtotalseg-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: libtotalseg-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-build/libtotalseg-linux-x64.tar.gz
            windows-build/libtotalseg-windows-x64.zip
          generate_release_notes: true
